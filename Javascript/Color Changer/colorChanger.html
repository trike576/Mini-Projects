<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="colorChanger.css">
    <title>Color Changer</title>
</head>

<body>
    <h1 class="title">Color Changer</h1>
    <p class="info">Click a button to change the background color!</p>
    <div class="bigBox">
        <button class="buttonRed">Red</button>
        <button class="buttonBlue">Blue</button>
        <button class="buttonGreen">Green</button>
        <button class="buttonYellow">Yellow</button>

        <button class="buttonRandom">Random Color</button>
    </div>


    <script src="colorChanger.js"></script>

</body>

</html>
