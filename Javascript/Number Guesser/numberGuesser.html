<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="numberGuesser.css">
    <title>Number Guesser</title>
</head>
<body>
    <div id="header">
        <h1 id="title">Number Guesser</h1>
        <p id="info">Guess a number between 1 and 100(inclusive)</p>
    </div>

    <div id="game">
        <input type = "text" id = "playerGuessInput" placeholder = "Enter your guess">
        <p id="feedback"></p>
        <p id = "attempts">Attempts: 0 </p>
        <div id = "buttonContainer">
            <button id = "submitGuess">Submit Guess</button>
            <button id = "resetGame">Reset Game</button>
        </div>
    </div>

    <script src="numberGuesser.js"></script>
</body>
</html>
