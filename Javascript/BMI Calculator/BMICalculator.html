<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="BMICalculator.css">
    <title>BMI Calculator</title>
</head>
<body>
    <div class="header">
        <h1 class="title">BMI Calculator</h1>
        <p class="info">Body Mass Index(BMI) is a measure of body fat based on height and weight.</p>
    </div>
    <div class="calculator">
        <input type="text" class="weightInput" placeholder="Enter your weight">
        <input type="text" class="heightInput" placeholder="Enter your height">
        <button class="calculateBMI">Calculate my BMI</button>
    </div>
    <div class="moreInfo">

    </div>


    <script src="BMICalculator.js"></script>
</body>
</html>
