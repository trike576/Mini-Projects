<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="githubUserCard.css">
    <title>Github User Card Generator</title>
</head>

<body>
    <div class="header">
        <h1>Github User Card Generator</h1>
    </div>

    <div class="mainContainer">
        <div class="userInput">
            <h2>Search GitHub User</h2>
            <input type="text" placeholder="Enter username" id="usernameInput">
            <button id="searchUser">
                Search
            </button>
            <p id="feedback"></p>
        </div>
        <div class="userCard">
            <img src="" alt="User Avatar" id="userAvatar">
            <p id="username">Username: </p>
            <p id="id">Id: </p>
            <p id="bio">Bio: </p>
            <p id="location">Location: </p>
            <p id="accountCreationDate">Account Creation Date: </p>
            <p id="publicRepos">Public Repos: </p>
            <p id="profileURL">Profile URL: </p>
            <p id="company">Company: </p>
            <p id="followers">Followers: </p>
            <p id="following">Following: </p>
        </div>
    </div>


    <script src="githubUserCard.js"></script>
</body>

</html>
